{% extends "base.html" %}

{% block nav %}
{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Вход</h3>
            </div>

            <div class="card-body p-4">
                <form action="{% url 'accounts:login' %}" id="login-form" class="text-start" method="post">
                    {% csrf_token %}
                    {% if has_error %}
                        <p class="form-error">Неверное имя пользователя или пароль.</p>
                    {% endif %}
                    <div class="form-group mb-3">
                        <label class="form-label" for="username">Имя пользователя:</label>
                        <input class="form-control" id="username" name="username" type="text">
                    </div>
                    <div class="form-group mb-3">
                        <label class="form-label" for="password">Пароль:</label>
                        <input class="form-control" id="password" name="password" type="password">
                    </div>
                </form>
            </div>
            <div class="card-footer text-center">
                <button class="btn btn-warning" form="login-form" type="submit">
                    Сохранить
                </button>
            </div>
        </div>

    </div>
</div>
{% endblock %}
