<div class="modal fade" id="task-{{ task.pk }}-Modal" tabindex="-1" aria-labelledby="textModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="textModalLabel">Удалить задачу</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Вы точно хотите удалить задачу '{{ task.description }}'?</p>
                <form action="{% url 'delete' task.pk %}" id="delete-form" method="post">{% csrf_token %}</form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-warning" data-bs-dismiss="modal">Отмена</button>
                <button type="submit" form="delete-form" class="btn btn-danger">Удалить</button>
            </div>
        </div>
    </div>
</div>
