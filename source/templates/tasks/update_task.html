{% extends "base.html" %}


{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">задача: {{ task.description }}</h3>
                </div>

                <div class="card-body">
                    {% include 'partial/task_form.html' with action=action %}
                </div>

                <div class="card-footer text-center">
                    <a href="/" class="btn btn-outline-success">
                        Назад
                    </a>
                    <button type="submit" form="task-form" class="btn btn-warning">
                            Сохранить
                    </button>
                </div>
            </div>

        </div>
    </div>
{% endblock %}
