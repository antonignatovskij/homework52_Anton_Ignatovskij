<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Tasks</title>
    <link crossorigin="anonymous"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-warning px-5">
    <div class="container-fluid">
        <button aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation" class="navbar-toggler"
                data-bs-target="#navbarNav" data-bs-toggle="collapse" type="button">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav">
                <a aria-current="page" class="nav-link active" href="/">К проектам</a>
                {% block nav %}
                {% endblock %}
                {% if request.user.is_authenticated %}
                    <a class="nav-link" href="{% url 'accounts:logout' %}">выйти</a>
                {% else %}
                    <a class="nav-link" href="{% url 'accounts:login' %}">Войти</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
<div class="container py-5">
    {% block content %}
    {% endblock %}
</div>
<script crossorigin="anonymous"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
